
[main]
theme = material-darker
print_estimate_method = file
print_sort_dir = date_desc

[printer Voron]
titlebar_items: chamber

[preheat PLA]
bed = 50 
extruder = 195

[preheat ABS]
bed = 100
extruder = 240

[preheat PETG]
bed = 80
extruder = 240

[preheat FLEX]
bed = 0
extruder = 210

